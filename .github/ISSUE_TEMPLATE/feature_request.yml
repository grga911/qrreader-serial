name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like qrreader-serial to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Python runtime
        - C++ runtime
        - Packaging / .deb
        - Install / update scripts
        - CI / releases
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
