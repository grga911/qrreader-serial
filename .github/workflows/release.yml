# Build PyInstaller binary + .deb and attach to GitHub Release on version tag.
#
# GitHub-hosted "ubuntu-20.04" runners are retired (2025-04). To support Ubuntu 20.04 /
# Debian 11 on target PCs, we build inside an ubuntu:20.04 *container* on ubuntu-22.04.
#
# Tag: git tag v4.0.1 && git push origin v4.0.1
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_image:
        description: 'Docker image for build (glibc compatibility)'
        required: true
        default: 'ubuntu:20.04'
        type: choice
        options:
          - ubuntu:20.04
          - ubuntu:22.04
          - debian:11
          - debian:10

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from git tag
        id: release
        run: |
          if echo "${{ github.ref }}" | grep -qE 'refs/tags/v'; then
            GIT_TAG="${{ github.ref_name }}"
          else
            GIT_TAG="v$(tr -d '\r\n' < VERSION)"
            echo "Not a tag build; using VERSION file → $GIT_TAG"
          fi
          VERSION="${GIT_TAG#v}"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb_version=${VERSION}-1" >> "$GITHUB_OUTPUT"

      - name: Sync VERSION and debian/changelog from tag
        run: |
          chmod +x scripts/sync-version-from-tag.sh
          GIT_TAG="${{ steps.release.outputs.git_tag }}" ./scripts/sync-version-from-tag.sh "${{ steps.release.outputs.git_tag }}"

      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 python3-venv python3-pip \
            debhelper debhelper-compat devscripts file binutils ca-certificates git

      - name: Show build environment
        run: |
          cat /etc/os-release
          ldd --version | head -1

      - name: Build PyInstaller binary
        run: |
          chmod +x scripts/build-pyinstaller.sh
          ./scripts/build-pyinstaller.sh

      - name: Verify debian/ packaging is in repo
        run: |
          test -f debian/control || (echo "debian/control missing — commit debian/" && exit 1)
          test -f debian/rules
          test -f debian/install
          test -f debian/changelog

      - name: Build .deb package
        env:
          GIT_TAG: ${{ steps.release.outputs.git_tag }}
        run: |
          chmod +x scripts/build-deb.sh debian/rules
          ./scripts/build-deb.sh

      - name: Collect release files
        run: |
          GIT_TAG="${{ steps.release.outputs.git_tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          DEB_VERSION="${{ steps.release.outputs.deb_version }}"
          IMAGE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}"
          IMAGE_TAG="$(echo "$IMAGE" | tr ':' '-')"
          mkdir -p release-assets
          cp dist/qrreader "release-assets/qrreader-${GIT_TAG}-linux-amd64-${IMAGE_TAG}"
          DEB_SRC="../qrreader_${DEB_VERSION}_amd64.deb"
          DEB_DST="release-assets/qrreader-${GIT_TAG}_amd64.deb"
          if [ -f "$DEB_SRC" ]; then
            cp "$DEB_SRC" "$DEB_DST"
          else
            cp ../*.deb "$DEB_DST" 2>/dev/null || true
          fi
          ls -la release-assets/

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.release.outputs.git_tag }}
          name: Release ${{ steps.release.outputs.git_tag }}
          files: release-assets/*.deb
          generate_release_notes: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/

  # Publish .deb as apt repo on GitHub Pages (gh-pages branch) → apt update && apt upgrade
  publish-apt-pages:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Build apt repository index
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils
          mkdir -p apt-publish
          cp release-assets/*.deb apt-publish/
          chmod +x scripts/setup-apt-repo.sh
          ./scripts/setup-apt-repo.sh apt-publish

      - name: Deploy Python apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-publish
          publish_branch: gh-pages
          destination_dir: apt/python
          keep_files: true
          commit_message: 'apt: publish qrreader-python ${{ github.ref_name }}'

      - name: Pages URL hint
        run: |
          echo "Enable Pages: Settings → Pages → Branch gh-pages → folder / (root)"
          echo "APT line:"
          echo "  deb [trusted=yes] https://${{ github.event.repository.owner.login }}.github.io/${{ github.event.repository.name }}/apt/python ./"
