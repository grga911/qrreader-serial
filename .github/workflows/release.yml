# Build PyInstaller binary + .deb and attach to GitHub Release on version tag.
# Create release: git tag v1.0.0 && git push origin v1.0.0
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-venv python3-pip \
            debhelper devscripts file binutils

      - name: Build PyInstaller binary
        run: |
          chmod +x scripts/build-pyinstaller.sh
          ./scripts/build-pyinstaller.sh

      - name: Verify debian/ packaging is in repo
        run: |
          test -f debian/control || (echo "debian/control missing — commit debian/ (not in .gitignore)" && exit 1)
          test -f debian/rules
          test -f debian/install
          test -f debian/changelog

      - name: Build .deb package
        run: |
          chmod +x scripts/build-deb.sh debian/rules
          ./scripts/build-deb.sh

      - name: Collect release files
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          mkdir -p release-assets
          cp dist/qrreader "release-assets/qrreader-${VERSION}-linux-amd64"
          cp "../qrreader_${VERSION}-1_amd64.deb" "release-assets/" 2>/dev/null || \
            cp ../*.deb release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
