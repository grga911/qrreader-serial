# Build PyInstaller binary + .deb and attach to GitHub Release on version tag.
#
# GitHub-hosted "ubuntu-20.04" runners are retired (2025-04). To support Ubuntu 20.04 /
# Debian 11 on target PCs, we build inside an ubuntu:20.04 *container* on ubuntu-22.04.
#
# Tag: git tag v4.0.1 && git push origin v4.0.1
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_image:
        description: 'Docker image for build (glibc compatibility)'
        required: true
        default: 'ubuntu:20.04'
        type: choice
        options:
          - ubuntu:20.04
          - ubuntu:22.04
          - debian:11
          - debian:10

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            python3 python3-venv python3-pip \
            debhelper debhelper-compat devscripts file binutils ca-certificates git

      - name: Show build environment
        run: |
          cat /etc/os-release
          ldd --version | head -1

      - name: Build PyInstaller binary
        run: |
          chmod +x scripts/build-pyinstaller.sh
          ./scripts/build-pyinstaller.sh

      - name: Verify debian/ packaging is in repo
        run: |
          test -f debian/control || (echo "debian/control missing — commit debian/" && exit 1)
          test -f debian/rules
          test -f debian/install
          test -f debian/changelog

      - name: Build .deb package
        run: |
          chmod +x scripts/build-deb.sh debian/rules
          ./scripts/build-deb.sh

      - name: Collect release files
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          IMAGE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}"
          IMAGE_TAG="$(echo "$IMAGE" | tr ':' '-')"
          mkdir -p release-assets
          cp dist/qrreader "release-assets/qrreader-${VERSION}-linux-amd64-${IMAGE_TAG}"
          cp ../*.deb release-assets/ 2>/dev/null || true
          ls -la release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/

  # Publish .deb as apt repo on GitHub Pages (gh-pages branch) → apt update && apt upgrade
  publish-apt-pages:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Build apt repository index
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils
          mkdir -p apt-publish
          cp release-assets/*.deb apt-publish/
          chmod +x scripts/setup-apt-repo.sh
          ./scripts/setup-apt-repo.sh apt-publish

      - name: Deploy apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-publish
          publish_branch: gh-pages
          destination_dir: apt
          commit_message: 'apt: publish qrreader ${{ github.ref_name }}'

      - name: Pages URL hint
        run: |
          echo "Enable Pages: Settings → Pages → Branch gh-pages → folder / (root)"
          echo "APT line:"
          echo "  deb [trusted=yes] https://${{ github.event.repository.owner.login }}.github.io/${{ github.event.repository.name }}/apt ./"
