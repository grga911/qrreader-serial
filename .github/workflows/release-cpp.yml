name: Release C++ Linux .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 4.1.1 or v4.1.1). Leave empty to use VERSION/debian_cpp/changelog.'
        required: false
        default: ''
      build_image:
        description: 'Docker image for build'
        required: true
        default: 'ubuntu:20.04'
        type: choice
        options:
          - ubuntu:20.04
          - ubuntu:22.04
          - debian:11
          - debian:10

permissions:
  contents: write

jobs:
  build-cpp:
    runs-on: ubuntu-22.04
    container:
      image: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from git tag
        id: release
        run: |
          chmod +x scripts/resolve-release-version.sh
          ./scripts/resolve-release-version.sh debian_cpp/changelog "${{ github.event.inputs.version }}"

      - name: Sync VERSION and debian/changelog from tag
        run: |
          chmod +x scripts/sync-version-from-tag.sh
          GIT_TAG="${{ steps.release.outputs.git_tag }}" ./scripts/sync-version-from-tag.sh "${{ steps.release.outputs.git_tag }}"

      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake \
            debhelper debhelper-compat devscripts dpkg-dev \
            file binutils ca-certificates git apt-utils

      - name: Show build environment
        run: |
          cat /etc/os-release
          g++ --version
          cmake --version
          ldd --version | head -1

      - name: Build C++ binary
        run: |
          chmod +x scripts/build-cpp.sh
          ./scripts/build-cpp.sh

      - name: Build C++ .deb
        env:
          GIT_TAG: ${{ steps.release.outputs.git_tag }}
        run: |
          chmod +x scripts/build-deb-cpp.sh debian_cpp/rules
          ./scripts/build-deb-cpp.sh

      - name: Collect C++ release files
        run: |
          GIT_TAG="${{ steps.release.outputs.git_tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          DEB_VERSION="${{ steps.release.outputs.deb_version }}"
          IMAGE="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_image || 'ubuntu:20.04' }}"
          IMAGE_TAG="$(echo "$IMAGE" | tr ':' '-')"
          mkdir -p release-assets-cpp
          find .. -maxdepth 1 -name "*.deb" -type f -exec cp -v {} release-assets-cpp/ \;
          cp dist/qrreader "release-assets-cpp/qrreader-cpp-${GIT_TAG}-linux-amd64" || true
          ls -la release-assets-cpp/

      - name: Upload C++ build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-cpp
          path: release-assets-cpp/

      - name: Upload C++ to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.release.outputs.git_tag }}
          name: Release ${{ steps.release.outputs.git_tag }}
          files: |
            release-assets-cpp/*
          generate_release_notes: true

  publish-apt-pages-cpp:
    needs: build-cpp
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets-cpp
          path: release-assets-cpp

      - name: Build C++ apt repository index
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils
          mkdir -p apt-publish
          cp release-assets-cpp/*.deb apt-publish/
          ls -la apt-publish/
          chmod +x scripts/setup-apt-repo.sh
          ./scripts/setup-apt-repo.sh apt-publish

      - name: Deploy C++ apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-publish
          publish_branch: gh-pages
          destination_dir: apt/cpp
          keep_files: true
          commit_message: 'apt: publish qrreader-cpp ${{ github.ref_name }}'

      - name: Pages URL hint
        run: |
          echo "APT line:"
          echo "  deb [trusted=yes] https://${{ github.event.repository.owner.login }}.github.io/${{ github.event.repository.name }}/apt/cpp ./"